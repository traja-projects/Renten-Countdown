<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="index, follow">
  <title>Renten Countdown</title>
  <meta name="description" content="Renten Countdown — noch nicht in Rente, aber schon im Mindset.">
  <style>
    :root {
      --bg: #FAF6EE;       /* kBackground */
      --ink: #1A1008;      /* kPrimary    */
      --accent: #8B1A1A;   /* kAccent     */
      --secondary: #5A4A3A;/* kSecondary  */
      --border: #B8A890;   /* kBorder     */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 460px;
      width: 100%;
      text-align: center;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--secondary);
      margin: 0 0 12px;
    }
    h1 {
      color: var(--accent);
      font-size: 34px;
      font-weight: 900;
      line-height: 1.1;
      margin: 0 0 14px;
    }
    .slogan { font-size: 17px; font-weight: 500; margin: 0 0 28px; color: var(--ink); }
    .hint { font-size: 14px; color: var(--secondary); margin: 0; }
    .stores { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 0 0 24px; }
    .store-btn {
      display: inline-block;
      padding: 12px 20px;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      text-decoration: none;
      color: var(--ink);
      font-weight: 700;
      font-size: 14px;
      background: transparent;
    }
    .store-btn[hidden] { display: none; }
    .legal {
      position: fixed; left: 0; right: 0; bottom: 14px;
      text-align: center; font-size: 12px;
    }
    .legal a { color: var(--secondary); text-decoration: none; }
    .legal a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <noscript>
    <main>
      <h1>Renten Countdown</h1>
      <p class="slogan">Noch nicht in Rente, aber schon im Mindset.</p>
      <p class="hint">Bald im App&nbsp;Store &amp; Play&nbsp;Store.</p>
    </main>
  </noscript>

  <!-- Standardmäßig sichtbar: bleibt auch bei einem JS-Fehler stehen (keine leere Seite). -->
  <main id="fallback">
    <p class="eyebrow">Renten Countdown</p>
    <h1>Noch nicht in Rente,<br>aber schon im Mindset.</h1>
    <p class="slogan">Der ehrliche Countdown bis zur Rente.</p>
    <div class="stores">
      <a id="appstore" class="store-btn" href="#" hidden>App&nbsp;Store</a>
      <a id="playstore" class="store-btn" href="#" hidden>Play&nbsp;Store</a>
    </div>
    <p class="hint" id="soon">Bald im App&nbsp;Store &amp; Play&nbsp;Store.</p>
  </main>

  <footer class="legal">
    <a href="datenschutz.html">Datenschutz</a> · <a href="impressum.html">Impressum</a>
  </footer>

  <script>
    (function () {
      // ── Konfiguration ── (nach dem jeweiligen Store-Release ausfüllen)
      var APPLE_APP_ID    = "6779786185";                  // numerische App-Store-ID, z.B. "1234567890"
      var ANDROID_PACKAGE = "de.tranbao.rentencountdown";
      var ANDROID_LIVE    = false;                         // auf true, sobald die Android-App live ist

      var APP_STORE_URL = APPLE_APP_ID ? "https://apps.apple.com/app/id" + APPLE_APP_ID : "";
      var PLAY_STORE_URL = ANDROID_LIVE
        ? "https://play.google.com/store/apps/details?id=" + ANDROID_PACKAGE
        : "";

      var ua = navigator.userAgent || "";
      // iPadOS meldet sich teils als Macintosh — Touch-Check fängt das ab.
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (/Macintosh/.test(ua) && "ontouchend" in document);
      var isAndroid = /android/i.test(ua);

      // Direkte Weiterleitung, wenn der passende Store live ist.
      if (isIOS && APP_STORE_URL) { location.replace(APP_STORE_URL); return; }
      if (isAndroid && PLAY_STORE_URL) { location.replace(PLAY_STORE_URL); return; }

      // Sonst: freundliche Fallback-Seite zeigen (kein toter Redirect).
      // Die Seite ist bereits sichtbar; hier nur ggf. Store-Buttons einblenden.
      var anyStoreLive = false;

      if (APP_STORE_URL) {
        var a = document.getElementById("appstore");
        a.href = APP_STORE_URL; a.hidden = false; anyStoreLive = true;
      }
      if (PLAY_STORE_URL) {
        var p = document.getElementById("playstore");
        p.href = PLAY_STORE_URL; p.hidden = false; anyStoreLive = true;
      }
      if (anyStoreLive) document.getElementById("soon").hidden = true;
    })();
  </script>
</body>
</html>
